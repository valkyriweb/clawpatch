<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4e8db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a9d8f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ff6b4a;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff6b4a;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="clawGradTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a6d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e85535;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clawGradBottom" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a9d8f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#46b5a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52b788;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="jointGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffb4a2;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ff8a6d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b4a;stop-opacity:1" />
    </radialGradient>
    <filter id="clawShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glow -->
  <circle cx="900" cy="150" r="300" fill="url(#glow)"/>

  <!-- Large claw icon -->
  <g transform="translate(170, 265) scale(2.5)">
    <!-- Main claw body (shell) -->
    <ellipse cx="50" cy="50" rx="22" ry="18" fill="url(#jointGrad)" filter="url(#clawShadow)"/>

    <!-- Top pincer (upper claw) -->
    <g filter="url(#clawShadow)">
      <path d="M 50 32 Q 45 28, 40 22 Q 38 19, 36 15 Q 35 12, 36 10 Q 37 8, 40 9 Q 42 10, 43 13 Q 45 18, 47 23 Q 48 26, 50 30 Z"
            fill="url(#clawGradTop)" stroke="#e85535" stroke-width="0.5"/>
      <path d="M 50 32 Q 55 28, 60 22 Q 62 19, 64 15 Q 65 12, 64 10 Q 63 8, 60 9 Q 58 10, 57 13 Q 55 18, 53 23 Q 52 26, 50 30 Z"
            fill="url(#clawGradTop)" stroke="#e85535" stroke-width="0.5" opacity="0.95"/>
      <path d="M 36 15 Q 34 13, 35 11 Q 36 9, 38 10 Q 39 11, 38 13 Z" fill="#e85535"/>
      <path d="M 64 15 Q 66 13, 65 11 Q 64 9, 62 10 Q 61 11, 62 13 Z" fill="#e85535"/>
      <ellipse cx="48" cy="24" rx="3" ry="5" fill="rgba(255,255,255,0.35)" opacity="0.8"/>
    </g>

    <!-- Bottom pincer (lower claw) -->
    <g filter="url(#clawShadow)">
      <path d="M 50 68 Q 45 72, 40 78 Q 38 81, 36 85 Q 35 88, 36 90 Q 37 92, 40 91 Q 42 90, 43 87 Q 45 82, 47 77 Q 48 74, 50 70 Z"
            fill="url(#clawGradBottom)" stroke="#1a7f73" stroke-width="0.5"/>
      <path d="M 50 68 Q 55 72, 60 78 Q 62 81, 64 85 Q 65 88, 64 90 Q 63 92, 60 91 Q 58 90, 57 87 Q 55 82, 53 77 Q 52 74, 50 70 Z"
            fill="url(#clawGradBottom)" stroke="#1a7f73" stroke-width="0.5" opacity="0.95"/>
      <path d="M 36 85 Q 34 87, 35 89 Q 36 91, 38 90 Q 39 89, 38 87 Z" fill="#1a7f73"/>
      <path d="M 64 85 Q 66 87, 65 89 Q 64 91, 62 90 Q 61 89, 62 87 Z" fill="#1a7f73"/>
      <ellipse cx="48" cy="76" rx="3" ry="5" fill="rgba(255,255,255,0.25)" opacity="0.8"/>
    </g>

    <!-- Joint details (shell segments) -->
    <ellipse cx="50" cy="50" rx="18" ry="14" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <ellipse cx="50" cy="50" rx="14" ry="11" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>

    <!-- Center highlight (main shine) -->
    <ellipse cx="46" cy="46" rx="8" ry="6" fill="rgba(255,255,255,0.4)" opacity="0.9"/>
    <ellipse cx="44" cy="44" rx="4" ry="3" fill="rgba(255,255,255,0.6)"/>

    <!-- Small detail dots (texture) -->
    <circle cx="42" cy="52" r="1" fill="rgba(0,0,0,0.15)"/>
    <circle cx="58" cy="52" r="1" fill="rgba(0,0,0,0.15)"/>
    <circle cx="50" cy="56" r="0.8" fill="rgba(0,0,0,0.1)"/>
  </g>

  <!-- Text content -->
  <text x="350" y="235" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)">
    clawpatch
  </text>
  <text x="350" y="300" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#2c3e50">
    Automated code review that lands fixes
  </text>
  <text x="350" y="370" font-family="Inter, sans-serif" font-size="26" fill="#6c7a89">
    Semantic analysis • Automated patching • Safety first
  </text>

  <!-- Bottom badge -->
  <g transform="translate(350, 450)">
    <rect width="460" height="60" rx="30" fill="#ff6b4a" opacity="0.1"/>
    <text x="230" y="40" font-family="JetBrains Mono, monospace" font-size="22" font-weight="500" fill="#ff6b4a" text-anchor="middle">
      npm install clawpatch
    </text>
  </g>

  <!-- Decorative elements -->
  <circle cx="1050" cy="500" r="40" fill="#ff6b4a" opacity="0.15"/>
  <circle cx="950" cy="550" r="25" fill="#2a9d8f" opacity="0.15"/>
  <circle cx="1100" cy="480" r="30" fill="#52b788" opacity="0.15"/>
</svg>
